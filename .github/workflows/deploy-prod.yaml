name: Build and Deploy to Prod Artifact and Cloud Run

on:
  workflow_dispatch:
    inputs:
      image_digest_ref:
        description: "Existing immutable image digest ref (repo@sha256:...) to promote"
        required: false
        type: string

env:
  PROJECT_ID: ${{ secrets.PROD_GCLOUD_PROJECT_ID }}
  IMAGE: potpie-app-stage # updated image name
  GAR_ZONE: us-central1 # artifact registry zone
  GAR_REPO: potpie-frontend # updated artifact registry repository
  CLOUD_RUN_SERVICE: potpie-frontend-stage # Add this line for Cloud Run service name
  PROMOTE_IMAGE_DIGEST_REF: ${{ github.event.inputs.image_digest_ref }}

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: false

      # Setup gcloud CLI
      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.PROD_GKE_SA_KEY }}"

      # Install gke-gcloud-auth-plugin
      - name: Install gke-gcloud-auth-plugin
        run: |-
          sudo apt-get update && sudo apt-get install -y apt-transport-https ca-certificates gnupg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] http://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin

      # Configure Docker to use the gcloud command-line tool as a credential
      # helper for authentication
      - name: Docker configuration
        run: |-
          gcloud auth configure-docker $GAR_ZONE-docker.pkg.dev

      # Extract variables and set them as environment variables
      - name: Extract and set environment variables
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.PROD_PUBLIC_FIREBASE_API_KEY }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.PROD_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.PROD_PUBLIC_FIREBASE_PROJECT_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.PROD_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PROD_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.PROD_PUBLIC_FIREBASE_APP_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_BASE_URL=${{ secrets.PROD_PUBLIC_BASE_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SKIP_PRO_CHECK=${{ secrets.PROD_PUBLIC_SKIP_PRO_CHECK }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_GITHUB_APP_NAME=${{ secrets.PROD_PUBLIC_GITHUB_APP_NAME }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_CONVERSATION_BASE_URL=${{ secrets.PROD_PUBLIC_CONVERSATION_BASE_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.PROD_NEXT_PUBLIC_POSTHOG_KEY }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.PROD_NEXT_PUBLIC_POSTHOG_HOST }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_URL=${{ secrets.PROD_NEXT_PUBLIC_APP_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUBSCRIPTION_BASE_URL=${{ secrets.PROD_NEXT_PUBLIC_SUBSCRIPTION_BASE_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_HMAC_SECRET_KEY=${{ secrets.PROD_NEXT_PUBLIC_HMAC_SECRET_KEY }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_POTPIE_PLUS_URL=${{ secrets.PROD_NEXT_PUBLIC_POTPIE_PLUS_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FORMBRICKS_ENVIRONMENT_ID=${{ secrets.PROD_NEXT_PUBLIC_FORMBRICKS_ENVIRONMENT_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FORMBRICKS_API_HOST=${{ secrets.PROD_NEXT_PUBLIC_FORMBRICKS_API_HOST }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_WORKFLOWS_URL=${{ secrets.PROD_NEXT_PUBLIC_WORKFLOWS_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SENTRY_CLIENT_ID=${{ secrets.PROD_NEXT_PUBLIC_SENTRY_CLIENT_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SENTRY_CLIENT_SECRET=${{ secrets.PROD_NEXT_PUBLIC_SENTRY_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SENTRY_REDIRECT_URI=${{ secrets.PROD_NEXT_PUBLIC_SENTRY_REDIRECT_URI }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_LINEAR_REDIRECT_URI=${{ secrets.PROD_NEXT_PUBLIC_LINEAR_REDIRECT_URI }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SLACK_SERVER=${{ secrets.PROD_NEXT_PUBLIC_SLACK_SERVER }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_MULTIMODAL_ENABLED=${{ secrets.PROD_NEXT_PUBLIC_MULTIMODAL_ENABLED }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_GOOGLE_SSO_CLIENT_ID=${{ secrets.PROD_NEXT_PUBLIC_GOOGLE_SSO_CLIENT_ID }}" >> $GITHUB_ENV
      # Build the Docker image
      - name: Build
        if: env.PROMOTE_IMAGE_DIGEST_REF == ''
        run: |-
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE_TAG="$GAR_ZONE-docker.pkg.dev/$PROJECT_ID/$GAR_REPO/$IMAGE:$SHORT_SHA"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          docker build \
            --tag "$IMAGE_TAG" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ env.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ env.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ env.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ env.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ env.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_BASE_URL="${{ env.NEXT_PUBLIC_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_SKIP_PRO_CHECK="${{ env.NEXT_PUBLIC_SKIP_PRO_CHECK }}" \
            --build-arg NEXT_PUBLIC_GITHUB_APP_NAME="${{ env.NEXT_PUBLIC_GITHUB_APP_NAME }}" \
            --build-arg NEXT_PUBLIC_CONVERSATION_BASE_URL="${{ env.NEXT_PUBLIC_CONVERSATION_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY="${{ env.NEXT_PUBLIC_POSTHOG_KEY }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST="${{ env.NEXT_PUBLIC_POSTHOG_HOST }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ env.NEXT_PUBLIC_APP_URL }}" \
            --build-arg NEXT_PUBLIC_SUBSCRIPTION_BASE_URL="${{ env.NEXT_PUBLIC_SUBSCRIPTION_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_HMAC_SECRET_KEY="${{ env.NEXT_PUBLIC_HMAC_SECRET_KEY }}" \
            --build-arg NEXT_PUBLIC_POTPIE_PLUS_URL="${{ env.NEXT_PUBLIC_POTPIE_PLUS_URL }}" \
            --build-arg NEXT_PUBLIC_FORMBRICKS_ENVIRONMENT_ID="${{ env.NEXT_PUBLIC_FORMBRICKS_ENVIRONMENT_ID }}" \
            --build-arg NEXT_PUBLIC_FORMBRICKS_API_HOST="${{ env.NEXT_PUBLIC_FORMBRICKS_API_HOST }}" \
            --build-arg NEXT_PUBLIC_WORKFLOWS_URL="${{ env.NEXT_PUBLIC_WORKFLOWS_URL }}" \
            --build-arg NEXT_PUBLIC_SENTRY_CLIENT_ID="${{ env.NEXT_PUBLIC_SENTRY_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_SENTRY_CLIENT_SECRET="${{ env.NEXT_PUBLIC_SENTRY_CLIENT_SECRET }}" \
            --build-arg NEXT_PUBLIC_SENTRY_REDIRECT_URI="${{ env.NEXT_PUBLIC_SENTRY_REDIRECT_URI }}" \
            --build-arg NEXT_PUBLIC_LINEAR_REDIRECT_URI="${{ env.NEXT_PUBLIC_LINEAR_REDIRECT_URI }}" \
            --build-arg NEXT_PUBLIC_SLACK_SERVER="${{ env.NEXT_PUBLIC_SLACK_SERVER }}" \
            --build-arg NEXT_PUBLIC_MULTIMODAL_ENABLED="${{ env.NEXT_PUBLIC_MULTIMODAL_ENABLED }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_SSO_CLIENT_ID="${{ env.NEXT_PUBLIC_GOOGLE_SSO_CLIENT_ID }}" \
            -f Dockerfile .

      # Push the Docker image to Google Artifact Registry
      - name: Publish
        if: env.PROMOTE_IMAGE_DIGEST_REF == ''
        run: |-
          docker push "$IMAGE_TAG"

      - name: Capture image digest
        if: env.PROMOTE_IMAGE_DIGEST_REF == ''
        id: capture-digest
        run: |-
          IMAGE_DIGEST_REF=$(gcloud artifacts docker images describe "$IMAGE_TAG" --format='value(image_summary.fully_qualified_digest)' || true)
          if [ -z "$IMAGE_DIGEST_REF" ]; then
            IMAGE_DIGEST_REF=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_TAG" || true)
          fi
          if [ -z "$IMAGE_DIGEST_REF" ]; then
            echo "Failed to resolve digest for $IMAGE_TAG" >&2
            exit 1
          fi
          echo "IMAGE_DIGEST_REF=$IMAGE_DIGEST_REF" >> $GITHUB_ENV

      - name: Select promoted digest
        run: |-
          if [ -n "$PROMOTE_IMAGE_DIGEST_REF" ]; then
            IMAGE_DIGEST_REF="$PROMOTE_IMAGE_DIGEST_REF"
          fi
          if [ -z "$IMAGE_DIGEST_REF" ]; then
            echo "No IMAGE_DIGEST_REF available for deployment" >&2
            exit 1
          fi
          if [[ "$IMAGE_DIGEST_REF" != *@sha256:* ]]; then
            echo "IMAGE_DIGEST_REF must be immutable and include @sha256:. Got: $IMAGE_DIGEST_REF" >&2
            exit 1
          fi
          echo "IMAGE_DIGEST_REF=$IMAGE_DIGEST_REF" >> $GITHUB_ENV

      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.IMAGE_DIGEST_REF }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.GAR_ZONE }} \
            --platform managed \
            --allow-unauthenticated
