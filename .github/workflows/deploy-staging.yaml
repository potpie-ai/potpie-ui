name: Build and Deploy to Staging Artifact and Cloud Run

on:
  workflow_dispatch:
    inputs:
      local_mode_only:
        description: >
          Customer / internal builds without Firebase: omit Firebase NEXT_PUBLIC_* at
          docker build so the app uses mock auth and /api/login. Requires secret
          STAGE_NEXT_PUBLIC_LOGIN_PASSWORD. Pushes to main ignore this (full staging build).
        type: boolean
        default: false
  push:
    branches:
      - main

env:
  # Set STAGE_GCLOUD_PROJECT_ID to staging-433102 in GitHub Actions secrets.
  PROJECT_ID: ${{ secrets.STAGE_GCLOUD_PROJECT_ID }}
  # Matches Artifact Registry: asia-south1/.../potpie-frontend-aws/potpie-ui-aws
  IMAGE: potpie-ui-aws
  GAR_ZONE: asia-south1
  GAR_REPO: potpie-frontend-aws
  CLOUD_RUN_SERVICE: potpie-frontend-stage
  # Branches listed here build without Firebase so the UI uses local/mock auth.
  LOCAL_MODE_BRANCH: cc-deployment

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: false

      # Setup gcloud CLI
      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.STAGE_GKE_SA_KEY }}"

      - name: Set active GCP project
        run: gcloud config set project "$PROJECT_ID"

      # IMAGE_TAG is: ${GAR_ZONE}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPO}/${IMAGE}:<sha>
      # For staging-433102: asia-south1-docker.pkg.dev/staging-433102/potpie-frontend-aws/potpie-ui-aws:<sha>
      - name: Confirm target project and Artifact Registry URL
        run: |
          if [ -z "${PROJECT_ID}" ]; then echo "::error::STAGE_GCLOUD_PROJECT_ID is empty — set repo secret STAGE_GCLOUD_PROJECT_ID (e.g. staging-433102)"; exit 1; fi
          echo "GAR_ZONE=$GAR_ZONE GAR_REPO=$GAR_REPO IMAGE=$IMAGE"
          gcloud projects describe "$PROJECT_ID" --format='table(projectId,name,lifecycleState)' || { echo "::error::PROJECT_ID is not readable or invalid: check STAGE_GCLOUD_PROJECT_ID"; exit 1; }
          echo "Docker push will use host: ${GAR_ZONE}-docker.pkg.dev (path segment after host must match project above)"

      - name: Verify CI identity (must have Artifact Registry Writer on target project)
        run: |
          echo "Active GCP identity for this job:"
          gcloud auth list --filter=status:ACTIVE --format="table(account,status)"
          echo "Target project: ${PROJECT_ID}"

      # Install gke-gcloud-auth-plugin
      - name: Install gke-gcloud-auth-plugin
        run: |-
          sudo apt-get update && sudo apt-get install -y apt-transport-https ca-certificates gnupg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] http://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin

      # Configure Docker to use the gcloud command-line tool as a credential
      # helper for authentication
      - name: Docker configuration
        run: |-
          gcloud auth configure-docker $GAR_ZONE-docker.pkg.dev

      # Extract variables and set them as environment variables
      - name: Extract and set environment variables
        run: |
          # local mode is enabled either explicitly from workflow_dispatch or automatically on the customer branch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.local_mode_only }}" = "true" ] || [ "${{ github.ref_name }}" = "${LOCAL_MODE_BRANCH}" ]; then
            echo "::notice::Local mode build — Firebase NEXT_PUBLIC_* cleared for branch ${{ github.ref_name }}; use email + STAGE_NEXT_PUBLIC_LOGIN_PASSWORD on /api/login"
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_TOKEN=${{ secrets.STAGE_NEXT_PUBLIC_FIREBASE_TOKEN }}" >> $GITHUB_ENV
          else
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.STAGE_NEXT_PUBLIC_FIREBASE_API_KEY }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.STAGE_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.STAGE_NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.STAGE_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.STAGE_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.STAGE_NEXT_PUBLIC_FIREBASE_APP_ID }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_FIREBASE_TOKEN=${{ secrets.STAGE_NEXT_PUBLIC_FIREBASE_TOKEN }}" >> $GITHUB_ENV
          fi
          echo "NEXT_PUBLIC_BASE_URL=${{ secrets.STAGE_NEXT_PUBLIC_BASE_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SKIP_PRO_CHECK=${{ secrets.STAGE_NEXT_PUBLIC_SKIP_PRO_CHECK }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_GITHUB_APP_NAME=${{ secrets.STAGE_NEXT_PUBLIC_GITHUB_APP_NAME }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_CONVERSATION_BASE_URL=${{ secrets.STAGE_NEXT_PUBLIC_CONVERSATION_BASE_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_DEFAULT_CHAT_AGENT_ID=${{ secrets.STAGE_NEXT_PUBLIC_DEFAULT_CHAT_AGENT_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.STAGE_NEXT_PUBLIC_POSTHOG_KEY }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.STAGE_NEXT_PUBLIC_POSTHOG_HOST }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_POTPIE_PLUS_URL=${{ secrets.STAGE_NEXT_PUBLIC_POTPIE_PLUS_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_URL=${{ secrets.STAGE_NEXT_PUBLIC_APP_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUBSCRIPTION_BASE_URL=${{ secrets.STAGE_NEXT_PUBLIC_SUBSCRIPTION_BASE_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_HMAC_SECRET_KEY=${{ secrets.STAGE_NEXT_PUBLIC_HMAC_SECRET_KEY }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FORMBRICKS_ENVIRONMENT_ID=${{ secrets.STAGE_NEXT_PUBLIC_FORMBRICKS_ENVIRONMENT_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FORMBRICKS_API_HOST=${{ secrets.STAGE_NEXT_PUBLIC_FORMBRICKS_API_HOST }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_WORKFLOWS_URL=${{ secrets.STAGE_NEXT_PUBLIC_WORKFLOWS_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SENTRY_CLIENT_ID=${{ secrets.STAGE_NEXT_PUBLIC_SENTRY_CLIENT_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SENTRY_CLIENT_SECRET=${{ secrets.STAGE_NEXT_PUBLIC_SENTRY_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SENTRY_REDIRECT_URI=${{ secrets.STAGE_NEXT_PUBLIC_SENTRY_REDIRECT_URI }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_LINEAR_REDIRECT_URI=${{ secrets.STAGE_NEXT_PUBLIC_LINEAR_REDIRECT_URI }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SLACK_SERVER=${{ secrets.STAGE_NEXT_PUBLIC_SLACK_SERVER }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_MULTIMODAL_ENABLED=${{ secrets.STAGE_NEXT_PUBLIC_MULTIMODAL_ENABLED }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_GOOGLE_SSO_CLIENT_ID=${{ secrets.STAGE_NEXT_PUBLIC_GOOGLE_SSO_CLIENT_ID }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_LOGIN_PASSWORD=${{ secrets.STAGE_NEXT_PUBLIC_LOGIN_PASSWORD }}" >> $GITHUB_ENV

      # Build the Docker image
      - name: Build
        run: |-
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE_TAG="$GAR_ZONE-docker.pkg.dev/$PROJECT_ID/$GAR_REPO/$IMAGE:$SHORT_SHA"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          docker build \
            --tag "$IMAGE_TAG" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ env.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ env.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ env.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ env.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ env.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_TOKEN="${{ env.NEXT_PUBLIC_FIREBASE_TOKEN }}" \
            --build-arg NEXT_PUBLIC_BASE_URL="${{ env.NEXT_PUBLIC_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_SKIP_PRO_CHECK="${{ env.NEXT_PUBLIC_SKIP_PRO_CHECK }}" \
            --build-arg NEXT_PUBLIC_GITHUB_APP_NAME="${{ env.NEXT_PUBLIC_GITHUB_APP_NAME }}" \
            --build-arg NEXT_PUBLIC_CONVERSATION_BASE_URL="${{ env.NEXT_PUBLIC_CONVERSATION_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_DEFAULT_CHAT_AGENT_ID="${{ env.NEXT_PUBLIC_DEFAULT_CHAT_AGENT_ID }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY="${{ env.NEXT_PUBLIC_POSTHOG_KEY }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST="${{ env.NEXT_PUBLIC_POSTHOG_HOST }}" \
            --build-arg NEXT_PUBLIC_POTPIE_PLUS_URL="${{ env.NEXT_PUBLIC_POTPIE_PLUS_URL }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ env.NEXT_PUBLIC_APP_URL }}" \
            --build-arg NEXT_PUBLIC_SUBSCRIPTION_BASE_URL="${{ env.NEXT_PUBLIC_SUBSCRIPTION_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_HMAC_SECRET_KEY="${{ env.NEXT_PUBLIC_HMAC_SECRET_KEY }}" \
            --build-arg NEXT_PUBLIC_FORMBRICKS_ENVIRONMENT_ID="${{ env.NEXT_PUBLIC_FORMBRICKS_ENVIRONMENT_ID }}" \
            --build-arg NEXT_PUBLIC_FORMBRICKS_API_HOST="${{ env.NEXT_PUBLIC_FORMBRICKS_API_HOST }}" \
            --build-arg NEXT_PUBLIC_WORKFLOWS_URL="${{ env.NEXT_PUBLIC_WORKFLOWS_URL }}" \
            --build-arg NEXT_PUBLIC_SENTRY_CLIENT_ID="${{ env.NEXT_PUBLIC_SENTRY_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_SENTRY_CLIENT_SECRET="${{ env.NEXT_PUBLIC_SENTRY_CLIENT_SECRET }}" \
            --build-arg NEXT_PUBLIC_SENTRY_REDIRECT_URI="${{ env.NEXT_PUBLIC_SENTRY_REDIRECT_URI }}" \
            --build-arg NEXT_PUBLIC_LINEAR_REDIRECT_URI="${{ env.NEXT_PUBLIC_LINEAR_REDIRECT_URI }}" \
            --build-arg NEXT_PUBLIC_SLACK_SERVER="${{ env.NEXT_PUBLIC_SLACK_SERVER }}" \
            --build-arg NEXT_PUBLIC_MULTIMODAL_ENABLED="${{ env.NEXT_PUBLIC_MULTIMODAL_ENABLED }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_SSO_CLIENT_ID="${{ env.NEXT_PUBLIC_GOOGLE_SSO_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_LOGIN_PASSWORD="${{ env.NEXT_PUBLIC_LOGIN_PASSWORD }}" \
            -f Dockerfile .

      # Push the Docker image to Google Artifact Registry
      - name: Publish
        run: |-
          docker push "$IMAGE_TAG"

      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.IMAGE_TAG }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.GAR_ZONE }} \
            --platform managed \
            --allow-unauthenticated
